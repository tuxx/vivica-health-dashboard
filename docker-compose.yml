services:
  vivica-dashboard:
    image: node:22-alpine
    working_dir: /app
    command: node server.js
    environment:
      # Inside the container the server must bind all interfaces for the port
      # mapping to reach it; actual exposure is controlled by the mapping below.
      HOST: 0.0.0.0
    ports:
      - "4173:4173"
    volumes:
      - .:/app
    restart: unless-stopped
